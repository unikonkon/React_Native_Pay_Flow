<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Category — Fat Orange Cat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans Thai', 'Quicksand', system-ui, sans-serif;
    background: #EFE3D2;
    background-image:
      radial-gradient(circle at 18% 20%, rgba(232,122,61,0.10) 0, transparent 35%),
      radial-gradient(circle at 85% 75%, rgba(217,84,74,0.08) 0, transparent 40%);
    min-height: 100vh;
    color: #2A2320;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px; gap: 32px; flex-wrap: wrap;
  }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.8px;
    color: #8A7A6B; text-transform: uppercase;
    text-align: center; margin-top: 12px;
  }
  .device-wrap { display: flex; flex-direction: column; align-items: center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="cat-icons.jsx"></script>
<script type="text/babel" src="categories-data.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "grid",
  "showAllScreens": true,
  "iconSize": 48
}/*EDITMODE-END*/;

function Phone({ children, label, screenLabel }) {
  return (
    <div className="device-wrap">
      <div data-screen-label={screenLabel}>
        <IOSDevice>
          <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden', background: '#FFF4E8' }}>
            {children}
          </div>
        </IOSDevice>
      </div>
      <div className="label">{label}</div>
    </div>
  );
}

function ScreenA({ density, openDetail, openAdd }) {
  return <CategoriesScreen density={density} onAdd={openAdd} openDetail={openDetail} />;
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [detail, setDetail] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [pickerIcon, setPickerIcon] = useState('paw');
  const [pickerColor, setPickerColor] = useState('#E87A3D');

  return (
    <div className="stage">
      {/* Screen 1: Categories grid */}
      <Phone label="01 — Categories" screenLabel="01 Categories">
        <ScreenA density={tweaks.density} openDetail={setDetail} openAdd={() => setAddOpen(true)} />
        <DetailSheet cat={detail} onClose={() => setDetail(null)} />
        <AddCategorySheet open={addOpen} onClose={() => setAddOpen(false)} />
      </Phone>

      {tweaks.showAllScreens && (
        <>
          {/* Screen 2: Detail open */}
          <Phone label="02 — Detail" screenLabel="02 Detail">
            <ScreenA density={tweaks.density} openDetail={() => {}} openAdd={() => {}} />
            <DetailSheet cat={CATEGORIES.expense[0]} onClose={() => {}} />
          </Phone>

          {/* Screen 3: Add category */}
          <Phone label="03 — Add Category" screenLabel="03 Add">
            <ScreenA density={tweaks.density} openDetail={() => {}} openAdd={() => {}} />
            <AddCategorySheet open={true} onClose={() => {}} />
          </Phone>

          {/* Screen 4: Icon picker */}
          <Phone label="04 — Icon Picker" screenLabel="04 Picker">
            <ScreenA density={tweaks.density} openDetail={() => {}} openAdd={() => {}} />
            <div style={{ position: 'absolute', inset: 0, background: 'rgba(42,35,32,0.45)', zIndex: 10 }} />
            <div style={{ position: 'absolute', inset: 0, zIndex: 30, pointerEvents: 'none' }}>
              <IconPickerSheet
                open={true}
                onClose={() => {}}
                onPick={setPickerIcon}
                currentIcon={pickerIcon}
                currentColor={pickerColor}
                onColorChange={setPickerColor}
              />
            </div>
          </Phone>
        </>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Layout">
          <TweakRadio
            label="Density"
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={['grid', 'list']}
          />
          <TweakToggle
            label="Show all screens"
            value={tweaks.showAllScreens}
            onChange={(v) => setTweak('showAllScreens', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
